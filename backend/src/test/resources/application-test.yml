# Test profile: use with AbstractIntegrationTest which overrides datasource via Testcontainers.
# Use create-drop so Hibernate creates schema from entities (avoids Flyway vs JPA init order).
spring:
  config:
    # Load .env if present, plus test-only file for EnvConfigImportTest
    import: optional:file:.env[.properties],optional:classpath:env-test.properties
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
