app:
  base-url: https://app.example.com
  rate-limit:
    enabled: true
    auth-requests-per-minute: 15
    interview-requests-per-minute: 30
    proctoring-session-requests-per-minute: 10
    proctoring-events-per-minute: 120

spring:
  application:
    name: future-scope-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/future_scope_dev
    username: future_scope
    password: future_scope
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

security:
  jwt:
    # Replace with a secure random 256-bit base64-encoded secret in real environments
    secret: "ZmFrZV9mYWtlX2Zha2VfZmFrZV9mYWtlX2Zha2VfZmFrZV9mYWtlX2Zha2U="
    access-token-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true

---

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/future_scope_test
    username: future_scope_test
    password: future_scope_test

app:
  rate-limit:
    enabled: false
