# app.* and security.jwt.* come from application.properties (via .env: APP_BASE_URL, SECURITY_JWT_SECRET, etc.)

spring:
  application:
    name: future-scope-backend

  datasource:
    # url, username, password come from application.properties (${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD} via .env)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# security.jwt.* from application.properties (.env: SECURITY_JWT_SECRET, SECURITY_JWT_ACCESS_TOKEN_MINUTES)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true

---

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/future_scope_test
    username: future_scope_test
    password: future_scope_test

app:
  rate-limit:
    enabled: false
