# Load .env from working directory (optional = no error if missing)
spring.config.import=optional:file:.env[.properties]

# Database – from .env or defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/future_scope_dev}
spring.datasource.username=${DB_USERNAME:future_scope}
spring.datasource.password=${DB_PASSWORD:future_scope}

# JWT – from .env or defaults
security.jwt.secret=${SECURITY_JWT_SECRET:ZmFrZV9mYWtlX2Zha2VfZmFrZV9mYWtlX2Zha2VfZmFrZV9mYWtlX2Zha2U=}
security.jwt.access-token-minutes=${SECURITY_JWT_ACCESS_TOKEN_MINUTES:60}

# App – from .env or defaults
app.base-url=${APP_BASE_URL:https://app.example.com}
# CORS – comma-separated origins allowed for browser requests (e.g. Next.js dev server)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-requests-per-minute=${APP_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:15}
app.rate-limit.interview-requests-per-minute=${APP_RATE_LIMIT_INTERVIEW_REQUESTS_PER_MINUTE:30}
app.rate-limit.proctoring-session-requests-per-minute=${APP_RATE_LIMIT_PROCTORING_SESSION_REQUESTS_PER_MINUTE:10}
app.rate-limit.proctoring-events-per-minute=${APP_RATE_LIMIT_PROCTORING_EVENTS_PER_MINUTE:120}
# Resume upload directory (relative to working dir or absolute path)
app.resume-upload.dir=${APP_RESUME_UPLOAD_DIR:./uploads/resumes}
app.avatar-upload.dir=${APP_AVATAR_UPLOAD_DIR:./uploads/avatars}
# E2E seed: when true, creates test-candidate@example.com / password123 on startup
app.e2e-seed.enabled=${APP_E2E_SEED_ENABLED:false}
app.e2e-seed.candidate-email=${APP_E2E_SEED_CANDIDATE_EMAIL:test-candidate@example.com}
app.e2e-seed.candidate-password=${APP_E2E_SEED_CANDIDATE_PASSWORD:password123}

# Server – from .env or default
server.port=${SERVER_PORT:8080}
